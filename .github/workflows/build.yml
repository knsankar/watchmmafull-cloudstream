      - name: Build Plugins
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew

          ./gradlew --version
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          ./gradlew make makePluginsJson --stacktrace --info

          echo "Produced cs3 files:"
          find . -name '*.cs3' -maxdepth 6 -print || true
          ls -la build || true

          # copy artifacts (avoid failing just because glob doesn't match)
          find . -name '*.cs3' -maxdepth 6 -exec cp -f {} "$GITHUB_WORKSPACE/builds/" \; || true
          cp -f build/plugins.json "$GITHUB_WORKSPACE/builds"
